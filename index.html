<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StalkBobby — Pick an Arena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .landing-wrap {
      max-width: 720px; width: 100%; text-align: center;
      position: relative; z-index: 10;
    }
    .landing-logo {
      width: 100px; height: 100px; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--ice-dim);
      box-shadow: 0 0 40px var(--ice-glow);
      margin-bottom: 20px;
    }
    .landing-title {
      font-family: var(--font-display); font-weight: 800;
      font-size: 36px; letter-spacing: 4px; color: var(--ice);
      text-shadow: 0 0 30px var(--ice-glow);
      margin-bottom: 6px;
    }
    .landing-sub {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-dim);
      letter-spacing: 3px; margin-bottom: 40px;
    }
    .arena-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-bottom: 30px;
    }
    .arena-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 32px 24px;
      cursor: pointer; text-decoration: none; color: inherit;
      transition: all 0.25s ease;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    .arena-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--ice-glow), transparent);
      opacity: 0; transition: opacity 0.25s ease;
    }
    .arena-card:hover {
      border-color: var(--ice);
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg), 0 0 30px var(--ice-glow);
    }
    .arena-card:hover::before { opacity: 1; }
    .arena-emoji { font-size: 56px; line-height: 1; position: relative; z-index: 1; }
    .arena-name {
      font-family: var(--font-display); font-weight: 700;
      font-size: 20px; letter-spacing: 2px; color: var(--ice);
      position: relative; z-index: 1;
    }
    .arena-tag {
      font-family: var(--font-mono); font-size: 11px;
      color: var(--text-dim); letter-spacing: 1.5px;
      position: relative; z-index: 1;
    }
    .footer-note {
      font-family: var(--font-mono); font-size: 10px;
      color: var(--text-muted); letter-spacing: 2px;
    }
    @media (max-width: 480px) {
      .landing-title { font-size: 26px; letter-spacing: 3px; }
      .arena-grid { grid-template-columns: 1fr; }
      .arena-card { padding: 24px 20px; }
      .arena-emoji { font-size: 48px; }
    }
  </style>
</head>
<body>
  <div class="landing-wrap">
    <img class="landing-logo" id="bobbyLogo" alt="Bobby the Seal" />
    <div class="landing-title">STALKBOBBY</div>
    <div class="landing-sub">SEAL TRACKING SYSTEM</div>

    <div class="arena-grid">
      <a href="./miami/" class="arena-card">
        <div class="arena-emoji">🌴</div>
        <div class="arena-name">MIAMI</div>
        <div class="arena-tag">Miami Ice Arena</div>
      </a>
      <a href="./pines/" class="arena-card">
        <div class="arena-emoji">🌲</div>
        <div class="arena-name">PINES</div>
        <div class="arena-tag">Pines Ice Arena</div>
      </a>
    </div>

    <div class="footer-note">PICK YOUR LOCATION TO CONTINUE</div>
  </div>
